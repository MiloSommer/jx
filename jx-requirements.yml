apiVersion: core.jenkins-x.io/v4beta1
kind: Requirements
spec:
  autoUpdate:
    enabled: false
    schedule: ""
  cluster:
    chartRepository: http://bucketrepo.jx.svc.cluster.local/bucketrepo/charts
    clusterName: milokube
    environmentGitOwner: MiloSommer
    gitKind: github
    gitName: github
    gitServer: https://github.com
    provider: kubernetes
    registry: ghcr.io
  environments:
  - key: dev
    owner: MiloSommer
    repository: jx
  - key: staging
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/service-upstream: "true"
    domain: jx.miloserver.local
    kind: ingress
    namespaceSubDomain: -jx.
    tls:
      email: ""
      enabled: true
      production: false
  pipelineUser:
    email: milosommer@hotmail.de
    username: MiloSommer
  repository: bucketrepo
  secretStorage: local
  vault: {}
  webhook: lighthouse
